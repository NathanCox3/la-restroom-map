services:
  db:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB: restrooms
      POSTGRES_USER: restrooms
      POSTGRES_PASSWORD: restrooms
    ports:
      - "5432:5432"
    volumes:
      - restroom_postgis:/var/lib/postgresql/data
      - ./db/schema.postgis.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restrooms -d restrooms"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  restroom_postgis:
